name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, build & smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # next-auth requires AUTH_SECRET at build time. Use a CI-only dummy.
      AUTH_SECRET: ci-dummy-secret-not-used-in-prod
      # GitHub OAuth — only required at runtime for /api/auth, set dummies for build.
      GITHUB_CLIENT_ID: ci-dummy
      GITHUB_CLIENT_SECRET: ci-dummy
      ADMIN_GITHUB_USERNAME: ci-dummy
      # Vercel Postgres — required so pages that query the DB during prerender don't crash.
      # Provide via repo secret POSTGRES_URL (point to a non-prod Neon branch / preview DB).
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build (next build)
        run: npm run build

      - name: Start server
        run: npm start &
        env:
          PORT: 3000

      - name: Smoke test
        run: npm run smoke
        env:
          SMOKE_BASE_URL: http://localhost:3000
